# Карта колонок исходного отчета.
# Код ищет колонку по регулярным выражениям ниже. Если в новом году формулировка вопроса изменится,
# достаточно добавить новый pattern в соответствующий список.

columns:
  org_name:
    label: Наименование организации
    patterns:
      - "^Наименование организации$"
  org_type:
    label: Тип организации
    patterns:
      - "^Тип организации\\.1$"
      - "^Тип организации$"
  federal_district:
    label: Федеральный округ
    patterns:
      - "^Федеральный округ$"
  region:
    label: Регион
    patterns:
      - "^Регион$"
  report_status:
    label: Статус отчета
    patterns:
      - "^Статус отчета$"
  report_date:
    label: Дата заполнения
    patterns:
      - "^Дата заполнения$"
  contact_name:
    label: ФИО контактного лица
    patterns:
      - "^ФИО$"
  contact_phone:
    label: Телефон
    patterns:
      - "^Телефон$"
  contact_email:
    label: Эл.почта
    patterns:
      - "^Эл\\.почта$"

  svk_organized:
    label: СВК организован и осуществляется
    patterns:
      - "организован и осуществляется внутренний контроль"
  accounting_policy:
    label: Раздел СВК в учетной политике
    patterns:
      - "Наличие в учетной политике.*внутреннего контроля"
  lna_approved:
    label: Организация СВК утверждена ЛНА
    patterns:
      - "Организация и осуществление внутреннего контроля утверждена ЛНА"
  powers_defined:
    label: Определены полномочия ответственных лиц
    patterns:
      - "Определены ли полномочия ответственных лиц"
  plan_schedule:
    label: План-график мероприятий СВК
    patterns:
      - "план-графика мероприятий.*внутреннего контроля"

  form_permanent_body:
    label: Постоянно действующий коллегиальный орган
    patterns:
      - "Создан постоянно действующий уполномоченный коллегиальный орган"
  form_temporary_body:
    label: Временный коллегиальный орган / комиссия
    patterns:
      - "коллегиальный орган.*создается на период проведения мероприятия"
  form_structural_unit:
    label: Уполномоченное структурное подразделение
    patterns:
      - "Создано уполномоченное структурное подразделение"
  form_responsible_person:
    label: Уполномоченное должностное лицо
    patterns:
      - "Назначено уполномоченное должностное лицо"
  form_other:
    label: Иной способ обеспечения СВК
    patterns:
      - "Иной способ обеспечения функционирования системы внутреннего контроля"
  form_other_text:
    label: Описание иного способа обеспечения СВК
    patterns:
      - "Укажите иной способ обеспечения функционирования системы внутреннего контроля"

  cover_fhd:
    label: Контроль ФХД
    patterns:
      - "Финансово-хозяйственная деятельность"
  cover_procurement:
    label: Контроль закупок
    patterns:
      - "Деятельность по закупке товаров, работ, услуг"
  cover_property:
    label: Контроль имущества
    patterns:
      - "Деятельность по использованию и распоряжению федеральным имуществом"
  cover_project:
    label: Контроль проектной деятельности
    patterns:
      - "Проектная деятельность"
  cover_other:
    label: Контроль иных видов деятельности
    patterns:
      - "Иные виды деятельности"
  cover_other_text:
    label: Описание иных направлений контроля
    patterns:
      - "Укажите иные виды направления деятельности"

  violations_total:
    label: Выявленные нарушения
    patterns:
      - "Количество выявленных нарушений"
  violations_fixed_on_time:
    label: Нарушения устранены в срок
    patterns:
      - "Из них устранено в срок"
  violations_fixed_late:
    label: Нарушения устранены с нарушением срока
    patterns:
      - "Из них устранено с нарушением срока"
  remediation_plans:
    label: Планы устранения нарушений
    patterns:
      - "Количество разработанных планов по устранению"
  lna_changes:
    label: Решения по внесению изменений в ЛНА
    patterns:
      - "решений по внесению изменений в ЛНА"
  disciplinary_decisions:
    label: Дисциплинарная ответственность
    patterns:
      - "привлечении к дисциплинарной ответственности"
  materials_law_enforcement:
    label: Материалы в правоохранительные органы / контрольные органы
    patterns:
      - "материалов, направленных в правоохранительные органы"
  materials_court:
    label: Материалы в суд
    patterns:
      - "материалов, направленных в суд"
  cancelled_decisions:
    label: Отменены в порядке обжалования
    patterns:
      - "Из них отменены в порядке обжалования"
  returned_refused:
    label: Возвращены, получен отказ
    patterns:
      - "Из них возвращены, получен отказ"
  refused_satisfaction:
    label: Отказано в удовлетворении
    patterns:
      - "Из них отказано в удовлетворении"

  risk_methodology:
    label: Методика выявления и оценки рисков
    patterns:
      - "Наличие и реализация методики по выявлению и оценке рисков"
  effectiveness_review:
    label: Внутренняя оценка эффективности СВК
    patterns:
      - "Проведение внутренней оценки эффективности"
  improvement_actions:
    label: Совершенствование СВК на основе оценки
    patterns:
      - "Совершенствование организации и осуществления внутреннего контроля"

  cash_receipts:
    label: Кассовые поступления
    patterns:
      - "Общая сумма кассовых поступлений"
  cash_payments:
    label: Кассовые выплаты
    patterns:
      - "Общая сумма кассовых выплат"
  staff_planned_start:
    label: Штатная численность на начало года
    patterns:
      - "Штатная численность 01\\.01"
  staff_planned_end:
    label: Штатная численность на конец года
    patterns:
      - "Штатная численность 31\\.12"
  staff_actual_start:
    label: Фактическая численность на начало года
    patterns:
      - "Фактическая численность 01\\.01"
  staff_actual_end:
    label: Фактическая численность на конец года
    patterns:
      - "Фактическая численность 31\\.12"
  staff_avg:
    label: Среднесписочная численность
    patterns:
      - "Среднесписочная численность"

  buildings_count:
    label: Здания и сооружения, ед.
    patterns:
      - "здания и сооружения.*ед"
  buildings_area:
    label: Здания и сооружения, кв.м.
    patterns:
      - "здания и сооружения.*кв.м"
  land_count:
    label: Земельные участки, ед.
    patterns:
      - "земля.*земельные участки.*ед"
  land_area:
    label: Земельные участки, кв.м.
    patterns:
      - "земля.*земельные участки.*кв.м"
  ocdi_count:
    label: ОЦДИ, ед.
    patterns:
      - "Особо ценное движимое имущество.*ед"
  ocdi_value:
    label: ОЦДИ, руб.
    patterns:
      - "Особо ценное движимое имущество.*руб"
  real_estate_ops_count:
    label: Операции с недвижимым имуществом, ед.
    patterns:
      - "Операции по распоряжению недвижимым имуществом.*ед"
  real_estate_ops_area:
    label: Операции с недвижимым имуществом, кв.м.
    patterns:
      - "Операции по распоряжению недвижимым имуществом.*кв.м"
  ocdi_ops_count:
    label: Операции с ОЦДИ, ед.
    patterns:
      - "Операции по распоряжению особо ценным движимым имуществом.*ед"
  ocdi_ops_value:
    label: Операции с ОЦДИ, руб.
    patterns:
      - "Операции по распоряжению особо ценным движимым имуществом.*руб"

  procurement_count:
    label: Закупки, ед.
    patterns:
      - "Совокупный годовой объем закупок.*ед"
  procurement_amount:
    label: Закупки, руб.
    patterns:
      - "Совокупный годовой объем закупок.*руб"

  project_count:
    label: Нацпроекты / госпрограммы, ед.
    patterns:
      - "участия в национальных проектах.*ед"
  project_amount:
    label: Нацпроекты / госпрограммы, руб.
    patterns:
      - "участия в национальных проектах.*руб"
  contracts_count:
    label: Хозяйственные договоры, ед.
    patterns:
      - "хозяйственным договорам.*ед"
  contracts_amount:
    label: Хозяйственные договоры, руб.
    patterns:
      - "хозяйственным договорам.*руб"

  fkhz_count:
    label: Факты хозяйственной жизни, ед.
    patterns:
      - "Общее количество Фактов хозяйственной жизни"
